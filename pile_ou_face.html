<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Pile ou Face</title>
  <link rel="icon" href="Sans titre 40_20260305172439.png">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; overflow-x: hidden; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #12100e;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .screen {
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      gap: 26px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      color: #f0d080;
      font-size: clamp(1.8rem, 7vw, 3rem);
      letter-spacing: 0.06em;
      text-align: center;
      text-shadow: 0 0 40px rgba(240,208,128,0.35);
    }

    /* INPUTS */
    .inputs {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      width: 100%;
      max-width: 440px;
      justify-content: center;
    }
    .input-group {
      display: flex; flex-direction: column; gap: 6px;
      flex: 1 1 160px; min-width: 140px; max-width: 200px;
    }
    .input-group label {
      font-size: 0.75rem; font-weight: 500;
      letter-spacing: 0.15em; text-transform: uppercase;
    }
    .group-pile label { color: #b78cff; }
    .group-face label { color: #5dade2; }
    .input-group input {
      border-radius: 10px; color: #fdf6e3;
      font-family: 'DM Sans', sans-serif; font-size: 0.92rem;
      padding: 11px 13px; outline: none;
      transition: border-color 0.2s, background 0.2s; width: 100%;
    }
    .group-pile input { background: rgba(183,140,255,0.08); border: 1.5px solid rgba(183,140,255,0.3); }
    .group-pile input:focus { border-color: #b78cff; background: rgba(183,140,255,0.15); }
    .group-face input { background: rgba(93,173,226,0.08); border: 1.5px solid rgba(93,173,226,0.3); }
    .group-face input:focus { border-color: #5dade2; background: rgba(93,173,226,0.15); }
    .input-group input::placeholder { color: rgba(253,246,227,0.28); }

    /* ── COIN 3D ── */
    .coin-scene {
      width: clamp(150px, 40vw, 190px);
      height: clamp(150px, 40vw, 190px);
      perspective: 500px;
      flex-shrink: 0;
      cursor: pointer;
      position: relative;
    }
    .coin-scene::after {
      content: '⚙';
      position: absolute;
      bottom: -4px; right: -4px;
      width: 26px; height: 26px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.45);
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      line-height: 26px;
      text-align: center;
    }
    .coin-scene:hover::after { opacity: 1; }
    .coin {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transform: rotateY(0deg);
      will-change: transform;
    }
    .coin-side {
      position: absolute; inset: 0;
      border-radius: 50%;
      background-size: cover;
      background-position: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    /* Tranche de la pièce : visible sur les côtés quand elle tourne */
    .coin-edge {
      position: absolute;
      left: 50%; top: 0;
      width: 12px; height: 100%;
      margin-left: -6px;
      background: linear-gradient(to bottom, #8a6a20, #f0d080, #c9a84c, #8a6a20);
      transform: rotateY(90deg);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    /* BUTTON */
    button.lancer {
      background: linear-gradient(135deg, #8a6a20, #c9a84c, #f0d080);
      border: none; border-radius: 50px; color: #12100e;
      cursor: pointer; font-family: 'Playfair Display', serif;
      font-size: clamp(0.88rem, 3vw, 1rem); font-weight: 700;
      letter-spacing: 0.1em; padding: 14px 36px;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
      box-shadow: 0 4px 24px rgba(201,168,76,0.4);
      white-space: nowrap; -webkit-tap-highlight-color: transparent;
      touch-action: manipulation; user-select: none;
    }
    button.lancer:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(201,168,76,0.55); }
    button.lancer:active:not(:disabled) { transform: scale(0.96); }
    button.lancer:disabled { opacity: 0.38; cursor: not-allowed; }

    /* Résultat précédent */
    .turn-info {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.08em;
    }
    .turn-info span { color: rgba(255,255,255,0.65); font-weight: 500; }

    /* Compteur */
    .stats {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .stat-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 10px 18px;
      min-width: 80px;
      transition: background 0.3s, border-color 0.3s, transform 0.2s;
    }
    .stat-box.active-pile {
      background: rgba(183,140,255,0.15);
      border-color: rgba(183,140,255,0.4);
      transform: scale(1.06);
    }
    .stat-box.active-face {
      background: rgba(93,173,226,0.15);
      border-color: rgba(93,173,226,0.4);
      transform: scale(1.06);
    }
    .stat-label {
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      font-weight: 500;
    }
    .stat-count {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      line-height: 1;
    }
    .stat-count.bump {
      animation: bump 0.35s cubic-bezier(0.34,1.6,0.64,1);
    }
    @keyframes bump {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.45); }
      100% { transform: scale(1); }
    }
    .stat-streak {
      font-size: 0.62rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.08em;
    }
    .stat-streak.hot { color: #f0d080; }
    .stat-divider {
      font-size: 1.2rem;
      color: rgba(255,255,255,0.15);
    }
    .btn-reset-stats {
      background: none;
      border: none;
      color: rgba(255,255,255,0.2);
      font-size: 0.68rem;
      cursor: pointer;
      letter-spacing: 0.08em;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      text-decoration: underline;
    }
    .btn-reset-stats:hover { color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.06); }

    /* RESULT OVERLAY */
    .result-overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: clamp(12px, 4vw, 22px);
      padding: 24px 20px; opacity: 0;
      pointer-events: none; transition: opacity 0.55s ease; z-index: 50;
    }
    .result-overlay.pile-bg { background: radial-gradient(ellipse at 40% 35%, #6d28d9 0%, #2e1065 55%, #0f0520 100%); }
    .result-overlay.face-bg { background: radial-gradient(ellipse at 60% 35%, #1a5276 0%, #0b2a40 55%, #040e18 100%); }
    .result-overlay.visible { opacity: 1; pointer-events: all; }
    .result-ring {
      position: absolute; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.07);
      animation: pulseRing 3.5s ease-in-out infinite; pointer-events: none;
    }
    .result-ring.r1 { width: min(300px,80vw); height: min(300px,80vw); }
    .result-ring.r2 { width: min(500px,130vw); height: min(500px,130vw); animation-delay: 1.2s; }
    @keyframes pulseRing {
      0%,100% { transform: scale(1); opacity: 0.45; }
      50%      { transform: scale(1.06); opacity: 0.12; }
    }
    .result-badge {
      font-size: clamp(0.65rem, 2vw, 0.82rem); font-weight: 500;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: rgba(255,255,255,0.5); position: relative;
    }
    .result-main {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 9vw, 4.5rem); font-weight: 900;
      color: #fff; text-align: center; padding: 0 16px;
      line-height: 1.15; text-shadow: 0 4px 30px rgba(0,0,0,0.5);
      position: relative; word-break: break-word; max-width: 90vw;
    }
    .result-main.pop { animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both; }
    @keyframes popIn {
      from { transform: scale(0.55); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .result-sub { font-size: clamp(0.85rem, 2.5vw, 1rem); color: rgba(255,255,255,0.48); position: relative; }
    .result-sub span { color: rgba(255,255,255,0.9); font-weight: 600; }
    .btn-retry {
      position: relative; background: rgba(255,255,255,0.12);
      border: 1.5px solid rgba(255,255,255,0.25); border-radius: 50px;
      color: #fff; cursor: pointer; font-family: 'DM Sans', sans-serif;
      font-size: clamp(0.85rem, 2.5vw, 0.95rem); letter-spacing: 0.1em;
      padding: 13px 38px; transition: background 0.2s, transform 0.15s;
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
      user-select: none; margin-top: 4px;
    }
    .btn-retry:hover  { background: rgba(255,255,255,0.22); }
    .btn-retry:active { transform: scale(0.96); }

    @media (max-height: 580px) {
      .screen { gap: 16px; padding: 14px; }
      .coin-scene { width: 100px; height: 100px; }
    }
    @media (max-width: 330px) {
      .inputs { flex-direction: column; align-items: stretch; }
      .input-group { max-width: 100%; }
    }

    /* ── MENU PIÈCE ── */
    .menu-overlay {
      position: fixed; inset: 0;
      background: rgba(10,8,5,0.7);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .menu-overlay.open { opacity: 1; pointer-events: all; }

    .menu-modal {
      background: #1e1a12;
      border: 1px solid rgba(240,208,128,0.2);
      border-radius: 20px;
      padding: 28px 26px 24px;
      width: 100%; max-width: 400px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.6);
      transform: scale(0.9) translateY(20px);
      transition: transform 0.3s cubic-bezier(0.34,1.4,0.64,1);
      max-height: 90vh;
      overflow-y: auto;
    }
    .menu-overlay.open .menu-modal { transform: scale(1) translateY(0); }

    .menu-modal h2 {
      font-family: 'Playfair Display', serif;
      color: #f0d080;
      font-size: 1.2rem;
      margin-bottom: 22px;
      letter-spacing: 0.04em;
      display: flex; align-items: center; gap: 10px;
    }

    .menu-section {
      margin-bottom: 22px;
    }
    .menu-section-title {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(240,208,128,0.5);
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(240,208,128,0.1);
    }

    /* Séquence programmée */
    .sequence-builder {
      display: flex; flex-direction: column; gap: 10px;
    }
    .seq-list {
      display: flex; flex-wrap: wrap; gap: 8px;
      min-height: 38px;
      padding: 8px;
      background: rgba(255,255,255,0.04);
      border: 1px dashed rgba(255,255,255,0.1);
      border-radius: 10px;
    }
    .seq-item {
      display: flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 4px 10px 4px 8px;
      font-size: 0.78rem;
      color: #fff;
      animation: seqIn 0.2s cubic-bezier(0.34,1.5,0.64,1) both;
    }
    @keyframes seqIn {
      from { transform: scale(0.6); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .seq-item.pile-item { background: rgba(183,140,255,0.2); border: 1px solid rgba(183,140,255,0.35); }
    .seq-item.face-item { background: rgba(93,173,226,0.2);  border: 1px solid rgba(93,173,226,0.35); }
    .seq-item button {
      background: none; border: none; color: rgba(255,255,255,0.4);
      cursor: pointer; font-size: 0.85rem; padding: 0; line-height: 1;
    }
    .seq-item button:hover { color: #ff6b6b; }
    .seq-empty {
      font-size: 0.75rem; color: rgba(255,255,255,0.2);
      font-style: italic; width: 100%; text-align: center; padding: 4px 0;
    }
    .seq-controls {
      display: flex; gap: 8px;
    }
    .btn-seq {
      flex: 1;
      padding: 9px;
      border: none; border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem; font-weight: 600;
      cursor: pointer; transition: transform 0.12s, opacity 0.15s;
    }
    .btn-seq:active { transform: scale(0.95); }
    .btn-seq.pile { background: rgba(183,140,255,0.25); color: #b78cff; border: 1px solid rgba(183,140,255,0.4); }
    .btn-seq.pile:hover { background: rgba(183,140,255,0.38); }
    .btn-seq.face { background: rgba(93,173,226,0.25);  color: #5dade2; border: 1px solid rgba(93,173,226,0.4); }
    .btn-seq.face:hover { background: rgba(93,173,226,0.38); }
    .btn-seq.clear { background: rgba(255,100,100,0.12); color: rgba(255,140,140,0.8); border: 1px solid rgba(255,100,100,0.2); flex: 0 0 auto; padding: 9px 14px; }
    .btn-seq.clear:hover { background: rgba(255,100,100,0.22); }

    .seq-info {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.3);
      text-align: center;
    }
    .seq-info span { color: #f0d080; }

    /* Modifier les stats */
    .stats-editor {
      display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
    }
    .stat-edit-box {
      display: flex; flex-direction: column; gap: 6px;
    }
    .stat-edit-box label {
      font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    .stat-edit-box.pile label { color: #b78cff; }
    .stat-edit-box.face label { color: #5dade2; }
    .stat-edit-box input[type=number] {
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 8px; color: #fff;
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem; font-weight: 700;
      padding: 8px 12px; outline: none;
      text-align: center;
      transition: border-color 0.2s;
      width: 100%;
    }
    .stat-edit-box.pile input:focus { border-color: #b78cff; }
    .stat-edit-box.face input:focus { border-color: #5dade2; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { opacity: 1; }

    /* Boutons du modal */
    .menu-footer {
      display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;
      padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.07);
    }
    .btn-menu-cancel {
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50px; color: rgba(255,255,255,0.5);
      font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
      padding: 9px 20px; cursor: pointer; transition: background 0.15s;
    }
    .btn-menu-cancel:hover { background: rgba(255,255,255,0.12); }
    .btn-menu-apply {
      background: linear-gradient(135deg, #8a6a20, #c9a84c, #f0d080);
      border: none; border-radius: 50px; color: #12100e;
      font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 700;
      padding: 9px 24px; cursor: pointer; transition: opacity 0.15s, transform 0.12s;
    }
    .btn-menu-apply:hover { opacity: 0.88; transform: translateY(-1px); }

  </style>
</head>
<body>

<div class="screen">
  <h1>Pile ou Face</h1>

  <div class="inputs">
    <div class="input-group group-pile">
      <label>🍋 Pile</label>
      <input type="text" id="textPile" placeholder="Ex : Je gagne !" maxlength="40"/>
    </div>
    <div class="input-group group-face">
      <label>🔵 Face</label>
      <input type="text" id="textFace" placeholder="Ex : Tu paies !" maxlength="40"/>
    </div>
  </div>

  <div class="coin-scene" id="coinScene">
    <div class="coin" id="coin">
      <div class="coin-side coin-pile"></div>
      <div class="coin-edge"></div>
      <div class="coin-side coin-face"></div>
    </div>
  </div>

  <!-- Compteur -->
  <div class="stats">
    <div class="stat-box" id="boxPile">
      <div class="stat-label">🍋 Pile</div>
      <div class="stat-count" id="countPile">0</div>
      <div class="stat-streak" id="streakPile">série : 0</div>
    </div>
    <div class="stat-divider">/</div>
    <div class="stat-box" id="boxFace">
      <div class="stat-label">🔵 Face</div>
      <div class="stat-count" id="countFace">0</div>
      <div class="stat-streak" id="streakFace">série : 0</div>
    </div>
  </div>

  <div class="turn-info" id="turnInfo">Résultat précédent : <span id="nextLabel">aucun</span></div>
  <button class="btn-reset-stats" onclick="resetStats()">↺ Réinitialiser les stats</button>

  <button class="lancer" id="btnLancer">✦ Lancer la pièce ✦</button>
</div>

<div class="result-overlay" id="resultOverlay">
  <div class="result-ring r1"></div>
  <div class="result-ring r2"></div>
  <div class="result-badge" id="resBadge"></div>
  <div class="result-main" id="resMain"></div>
  <div class="result-sub">C'est <span id="resSide"></span> !</div>
  <button class="btn-retry" id="btnRetry">↩ Relancer</button>
</div>



<!-- MENU PIÈCE -->
<div class="menu-overlay" id="menuOverlay">
  <div class="menu-modal">
    <h2>⚙ Paramètres secrets</h2>

    <!-- SÉQUENCE PROGRAMMÉE -->
    <div class="menu-section">
      <div class="menu-section-title">Programmer les prochains résultats</div>
      <div class="sequence-builder">
        <div class="seq-list" id="seqList">
          <div class="seq-empty" id="seqEmpty">Aucun résultat programmé — aléatoire</div>
        </div>
        <div class="seq-controls">
          <button class="btn-seq pile" onclick="addSeq('pile')">+ 🍋 Pile</button>
          <button class="btn-seq face" onclick="addSeq('face')">+ 🔵 Face</button>
          <button class="btn-seq clear" onclick="clearSeq()">✕</button>
        </div>
        <div class="seq-info" id="seqInfo">File vide — lancer aléatoire</div>
      </div>
    </div>

    <!-- MODIFIER LES STATS -->
    <div class="menu-section">
      <div class="menu-section-title">Modifier les statistiques</div>
      <div class="stats-editor">
        <div class="stat-edit-box pile">
          <label>🍋 Total Pile</label>
          <input type="number" id="editPile" min="0" value="0"/>
        </div>
        <div class="stat-edit-box face">
          <label>🔵 Total Face</label>
          <input type="number" id="editFace" min="0" value="0"/>
        </div>
        <div class="stat-edit-box pile">
          <label>🍋 Meilleure série Pile</label>
          <input type="number" id="editBestP" min="0" value="0"/>
        </div>
        <div class="stat-edit-box face">
          <label>🔵 Meilleure série Face</label>
          <input type="number" id="editBestF" min="0" value="0"/>
        </div>
      </div>
    </div>

    <div class="menu-footer">
      <button class="btn-menu-cancel" onclick="closeMenu()">Annuler</button>
      <button class="btn-menu-apply" onclick="applyMenu()">✓ Appliquer</button>
    </div>
  </div>
</div>

<script>
  var coin      = document.getElementById('coin');
  var btnLancer = document.getElementById('btnLancer');
  var btnRetry  = document.getElementById('btnRetry');
  var overlay   = document.getElementById('resultOverlay');
  var turnInfo  = document.getElementById('turnInfo');
  var nextLabel = document.getElementById('nextLabel');

  var spinning   = false;
  var currentRot = 0;
  var lastResult = null;
  var streak     = 0;

  // Statistiques
  var totalPile    = 0;
  var totalFace    = 0;
  var curStreak    = 0;  // série en cours
  var bestStreakP  = 0;  // meilleure série pile
  var bestStreakF  = 0;  // meilleure série face

  // Retourne le prochain résultat (file programmée en priorité, sinon aléatoire)
  function getNext() {
    if (programmedSeq.length > 0) {
      return programmedSeq.shift(); // consomme le premier élément
    }
    var rand = Math.random() < 0.5 ? 'pile' : 'face';
    // Anti-répétition : jamais plus de 2 fois d'affilée
    if (streak >= 2 && rand === lastResult) {
      rand = lastResult === 'pile' ? 'face' : 'pile';
    }
    return rand;
  }

  function updateTurnInfo(result) {
    var label = document.getElementById('nextLabel');
    if (result === null) {
      label.textContent = 'aucun';
    } else {
      label.textContent = result === 'pile' ? '🍋 Pile' : '🔵 Face';
    }
  }

  updateTurnInfo(null);

  function updateStats(isPile) {
    var result = isPile ? 'pile' : 'face';

    // Mise à jour série AVANT de changer lastResult
    if (result === lastResult) {
      curStreak++;
    } else {
      curStreak = 1;
    }
    lastResult = result;

    if (isPile) {
      totalPile++;
      if (curStreak > bestStreakP) bestStreakP = curStreak;
    } else {
      totalFace++;
      if (curStreak > bestStreakF) bestStreakF = curStreak;
    }

    // Compte pile
    var cp = document.getElementById('countPile');
    cp.textContent = totalPile;
    cp.classList.remove('bump');
    void cp.getBoundingClientRect();
    if (isPile) cp.classList.add('bump');

    // Compte face
    var cf = document.getElementById('countFace');
    cf.textContent = totalFace;
    cf.classList.remove('bump');
    void cf.getBoundingClientRect();
    if (!isPile) cf.classList.add('bump');

    // Série pile
    var sp = document.getElementById('streakPile');
    if (isPile && curStreak >= 2) {
      sp.textContent = 'série : ' + curStreak + (curStreak >= 3 ? ' 🔥' : '');
      sp.className = 'stat-streak hot';
    } else {
      sp.textContent = 'meilleur : ' + bestStreakP;
      sp.className = 'stat-streak';
    }

    // Série face
    var sf = document.getElementById('streakFace');
    if (!isPile && curStreak >= 2) {
      sf.textContent = 'série : ' + curStreak + (curStreak >= 3 ? ' 🔥' : '');
      sf.className = 'stat-streak hot';
    } else {
      sf.textContent = 'meilleur : ' + bestStreakF;
      sf.className = 'stat-streak';
    }

    // Surligne la boîte active
    document.getElementById('boxPile').className = 'stat-box' + (isPile  ? ' active-pile' : '');
    document.getElementById('boxFace').className = 'stat-box' + (!isPile ? ' active-face' : '');
  }

  function resetStats() {
    totalPile = 0; totalFace = 0;
    curStreak = 0; bestStreakP = 0; bestStreakF = 0;
    lastResult = null; streak = 0;
    document.getElementById('countPile').textContent  = '0';
    document.getElementById('countFace').textContent  = '0';
    document.getElementById('streakPile').textContent = 'série : 0';
    document.getElementById('streakFace').textContent = 'série : 0';
    document.getElementById('streakPile').className   = 'stat-streak';
    document.getElementById('streakFace').className   = 'stat-streak';
    document.getElementById('boxPile').className = 'stat-box';
    document.getElementById('boxFace').className = 'stat-box';
    document.getElementById('nextLabel').textContent  = 'aucun';
  }

  function lancerPiece() {
    if (spinning) return;
    spinning = true;
    btnLancer.disabled = true;

    var pileText = document.getElementById('textPile').value.trim() || 'Pile';
    var faceText = document.getElementById('textFace').value.trim() || 'Face';
    var result   = getNext();
    var isPile   = result === 'pile';

    // lastResult et streak sont mis à jour dans updateStats()

    // ── Calcul de la rotation finale ──
    // Pile = face avant = rotateY multiple de 360° → ...0, 360, 720...
    // Face = face arrière = 180° mod 360°         → ...180, 540, 900...
    // On veut toujours tourner dans le même sens (+) et faire au moins 3 tours complets (1080°)
    var minExtra = 1080; // au moins 3 tours
    var targetMod = isPile ? 0 : 180; // position finale mod 360

    // Trouve le prochain angle >= currentRot + minExtra qui finit sur targetMod
    var base = currentRot + minExtra;
    // Arrondi au prochain multiple de 180 >= base
    var steps = Math.ceil(base / 180);
    // Ajuste parité : pile = steps pair, face = steps impair
    if (isPile && steps % 2 !== 0) steps++;
    if (!isPile && steps % 2 === 0) steps++;
    var endRot = steps * 180;

    // S'assure d'au moins 900° de delta
    while (endRot - currentRot < 900) endRot += 360;

    // Lance l'animation JS (requestAnimationFrame pour un vrai easing)
    animateCoin(currentRot, endRot, 2000, function() {
      currentRot = endRot;
      showResult(isPile, isPile ? pileText : faceText);
    });
  }

  // Easing ease-in-out cubic
  function easeInOut(t) {
    return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
  }

  function animateCoin(fromRot, toRot, duration, onDone) {
    var start = null;
    var totalDeg = toRot - fromRot;

    function step(ts) {
      if (!start) start = ts;
      var elapsed = ts - start;
      var progress = Math.min(elapsed / duration, 1);
      var eased = easeInOut(progress);
      var rot = fromRot + totalDeg * eased;

      // Hauteur : arc en cloche, monte puis redescend
      var lift = Math.sin(progress * Math.PI) * 60; // max 60px en l'air

      coin.style.transform = 'rotateY(' + rot + 'deg) translateY(-' + lift + 'px)';

      if (progress < 1) {
        requestAnimationFrame(step);
      } else {
        coin.style.transform = 'rotateY(' + toRot + 'deg) translateY(0px)';
        onDone();
      }
    }
    requestAnimationFrame(step);
  }

  function showResult(isPile, texte) {
    updateTurnInfo(isPile ? 'pile' : 'face');
    updateStats(isPile);

    var resMain = document.getElementById('resMain');
    document.getElementById('resBadge').textContent = isPile ? '🍋 PILE' : '🔵 FACE';
    document.getElementById('resSide').textContent  = isPile ? 'Pile' : 'Face';
    overlay.classList.remove('pile-bg', 'face-bg', 'visible');
    overlay.classList.add(isPile ? 'pile-bg' : 'face-bg');
    resMain.classList.remove('pop');
    resMain.textContent = texte;
    void resMain.getBoundingClientRect();
    resMain.classList.add('pop');
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        overlay.classList.add('visible');
      });
    });
  }

  function reinitialiser() {
    overlay.classList.remove('visible');
    setTimeout(function() {
      overlay.classList.remove('pile-bg', 'face-bg');
      btnLancer.disabled = false;
      spinning = false;
    }, 600);
  }

  btnLancer.addEventListener('click', lancerPiece);
  btnRetry.addEventListener('click', reinitialiser);

  // ── MENU PIÈCE ──
  var programmedSeq = []; // file de résultats programmés

  document.getElementById('coinScene').addEventListener('click', function() {
    if (spinning) return;
    openMenu();
  });

  function openMenu() {
    document.getElementById('editPile').value  = totalPile;
    document.getElementById('editFace').value  = totalFace;
    document.getElementById('editBestP').value = bestStreakP;
    document.getElementById('editBestF').value = bestStreakF;
    renderSeqList();
    document.getElementById('menuOverlay').classList.add('open');
  }

  function closeMenu() {
    document.getElementById('menuOverlay').classList.remove('open');
  }

  function applyMenu() {
    var np  = parseInt(document.getElementById('editPile').value,  10);
    var nf  = parseInt(document.getElementById('editFace').value,  10);
    var nbp = parseInt(document.getElementById('editBestP').value, 10);
    var nbf = parseInt(document.getElementById('editBestF').value, 10);

    if (!isNaN(np)  && np  >= 0) totalPile   = np;
    if (!isNaN(nf)  && nf  >= 0) totalFace   = nf;
    if (!isNaN(nbp) && nbp >= 0) bestStreakP = nbp;
    if (!isNaN(nbf) && nbf >= 0) bestStreakF = nbf;

    // Rafraîchir l'affichage
    document.getElementById('countPile').textContent = totalPile;
    document.getElementById('countFace').textContent = totalFace;

    // Rafraîchir les sous-labels meilleur série
    var sp = document.getElementById('streakPile');
    if (!(lastResult === 'pile' && curStreak >= 2)) {
      sp.textContent = 'meilleur : ' + bestStreakP;
    }
    var sf = document.getElementById('streakFace');
    if (!(lastResult === 'face' && curStreak >= 2)) {
      sf.textContent = 'meilleur : ' + bestStreakF;
    }

    closeMenu();
  }

  function addSeq(result) {
    programmedSeq.push(result);
    renderSeqList();
  }

  function removeSeq(index) {
    programmedSeq.splice(index, 1);
    renderSeqList();
  }

  function clearSeq() {
    programmedSeq = [];
    renderSeqList();
  }

  function renderSeqList() {
    var list  = document.getElementById('seqList');
    var empty = document.getElementById('seqEmpty');
    var info  = document.getElementById('seqInfo');
    list.innerHTML = '';

    if (programmedSeq.length === 0) {
      empty = document.createElement('div');
      empty.className = 'seq-empty';
      empty.id = 'seqEmpty';
      empty.textContent = 'Aucun résultat programmé — aléatoire';
      list.appendChild(empty);
      info.innerHTML = 'File vide — lancer aléatoire';
    } else {
      programmedSeq.forEach(function(r, i) {
        var item = document.createElement('div');
        item.className = 'seq-item ' + (r === 'pile' ? 'pile-item' : 'face-item');
        item.innerHTML =
          '<span>' + (i+1) + '. ' + (r === 'pile' ? '🍋 Pile' : '🔵 Face') + '</span>' +
          '<button onclick="removeSeq(' + i + ')">×</button>';
        list.appendChild(item);
      });
      info.innerHTML = '<span>' + programmedSeq.length + '</span> résultat' + (programmedSeq.length > 1 ? 's' : '') + ' programmé' + (programmedSeq.length > 1 ? 's' : '');
    }
  }

  // Fermer en cliquant hors du modal
  document.getElementById('menuOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeMenu();
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeMenu();
  });


</script>
</body>
</html>
